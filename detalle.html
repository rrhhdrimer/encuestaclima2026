<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle · Clima Laboral 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#051C2C; --surface:#384967; --card:#0d2238;
    --sage:#B6CFD0; --silver:#DDE5ED; --muted:rgba(182,207,208,0.55);
    --border:rgba(182,207,208,0.12); --border2:rgba(182,207,208,0.22);
    --r:12px; --rlg:18px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--silver);min-height:100vh;}

  .topbar{background:var(--surface);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,0.3);}
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .topbar-logo{width:40px;height:40px;border-radius:8px;overflow:hidden;}
  .topbar-logo img{width:100%;height:100%;object-fit:cover;}
  .topbar-title{font-size:15px;font-weight:700;color:#fff;}
  .topbar-sub{font-size:11px;color:var(--muted);margin-top:1px;}
  .btn-back{display:flex;align-items:center;gap:6px;background:rgba(182,207,208,0.1);border:1px solid var(--border2);color:var(--sage);font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;border-radius:100px;cursor:pointer;text-decoration:none;transition:all 0.2s;}
  .btn-back:hover{background:rgba(182,207,208,0.18);}

  .main{max-width:960px;margin:0 auto;padding:32px 24px 80px;}

  /* HERO */
  .hero{background:var(--surface);border-radius:var(--rlg);padding:28px 32px;margin-bottom:28px;display:flex;align-items:center;gap:20px;}
  .hero-icon{font-size:36px;width:64px;height:64px;background:rgba(182,207,208,0.1);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .hero-eyebrow{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .hero-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px;}
  .hero-sub{font-size:13px;color:var(--muted);}
  .hero-score{margin-left:auto;text-align:center;flex-shrink:0;}
  .hero-score-val{font-size:48px;font-weight:700;line-height:1;}
  .hero-score-lbl{font-size:12px;color:var(--muted);margin-top:4px;}
  .hero-score-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 12px;border-radius:100px;margin-top:6px;}

  /* RESUMEN */
  .resumen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
  @media(max-width:640px){.resumen-grid{grid-template-columns:1fr;}}
  .resumen-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}
  .resumen-label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .resumen-val{font-size:28px;font-weight:700;color:#fff;}
  .resumen-val span{font-size:14px;color:var(--muted);}
  .resumen-sub{font-size:11px;color:var(--muted);margin-top:4px;}

  /* PREGUNTAS */
  .section-title{font-size:16px;font-weight:700;color:var(--silver);margin-bottom:4px;}
  .section-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}

  .pregunta-row{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;margin-bottom:10px;transition:border-color 0.2s;}
  .pregunta-row:hover{border-color:var(--border2);}
  .pregunta-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;}
  .pregunta-num{font-size:10px;font-weight:700;color:var(--muted);min-width:28px;padding-top:2px;}
  .pregunta-texto{font-size:13px;color:var(--silver);line-height:1.55;flex:1;}
  .pregunta-pct{font-size:15px;font-weight:700;min-width:46px;text-align:right;flex-shrink:0;}

  .barra-wrap{display:flex;align-items:center;gap:8px;}
  .barra-0{font-size:10px;color:var(--muted);min-width:14px;text-align:right;}
  .barra-bg{flex:1;background:rgba(182,207,208,0.1);border-radius:100px;height:7px;overflow:hidden;}
  .barra-fill{height:100%;border-radius:100px;transition:width 1s ease;}
  .barra-100{font-size:10px;color:var(--muted);min-width:24px;}

  /* Distribución de respuestas */
  .dist-wrap{display:flex;gap:4px;margin-top:10px;}
  .dist-item{flex:1;text-align:center;}
  .dist-bar-bg{background:rgba(182,207,208,0.08);border-radius:4px;height:32px;display:flex;align-items:flex-end;overflow:hidden;margin-bottom:3px;}
  .dist-bar-fill{width:100%;border-radius:4px;transition:height 0.8s ease;}
  .dist-label{font-size:8px;color:var(--muted);}
  .dist-pct{font-size:9px;font-weight:600;color:var(--silver);}

  /* Loading */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;}
  .spinner{width:44px;height:44px;border:3px solid rgba(182,207,208,0.1);border-top-color:var(--sage);border-radius:50%;animation:spin 0.75s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-size:13px;color:var(--muted);}

  .empty{text-align:center;padding:60px;color:var(--muted);}
</style>
</head>

const DIMS = {

  'Empresa y camaradería':{start:38, end:60,  preguntas: PREGUNTAS.empresa,  icon:'🤝', sub:'¿Cómo te sientes respecto a los recursos, ambiente laboral, beneficios y la relación con tus compañeros?'}
};

const ESC_LABELS = ['Nunca','Rara vez','A veces','Frecuentemente','Siempre'];
const ESC_COLORS = ['#e05c5c','#e07a2a','#e8b84b','#4caf7d','#2e7d32'];

function barColor(s) {
  if (s >= 90) return '#2e7d32';
  if (s >= 75) return '#4caf7d';
  if (s >= 60) return '#e8b84b';
  if (s >= 45) return '#e07a2a';
  return '#e05c5c';
}
function scoreLabel(s) {
  if (s >= 90) return 'Excelente';
  if (s >= 75) return 'Muy bueno';
  if (s >= 60) return 'Bueno';
  if (s >= 45) return 'Regular';
  return 'Crítico';
}

// Leer parámetros URL
const params = new URLSearchParams(window.location.search);
const tipo  = params.get('tipo');  // 'dimension' o 'jefe'
const nombre = decodeURIComponent(params.get('nombre') || '');

async function cargarDatos() {
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const json = await res.json();
    const rows = (json.data || []).filter(function(r){ return r.gerencia; });
    renderDetalle(rows);
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div class="empty">Error al cargar datos. Intenta recargar la página.</div>';
  }
}

function calcPct(vals) {
  if (!vals.length) return 0;
  const fav = vals.filter(function(v){ return v >= 4; }).length;
  return Math.round(fav / vals.length * 100);
}

function renderDetalle(allData) {
  const cont = document.getElementById('content');
  document.getElementById('loading').style.display = 'none';
  cont.style.display = 'block';

  if (tipo === 'dimension') {
    renderDimension(allData);
  } else if (tipo === 'jefe') {
    renderJefe(allData);
  } else {
    cont.innerHTML = '<div class="empty">Parámetros no válidos.</div>';
  }
}

function renderDimension(allData) {
  const dim = DIMS[nombre];
  if (!dim) { document.getElementById('content').innerHTML = '<div class="empty">Dimensión no encontrada.</div>'; return; }

  document.getElementById('topbar-title').textContent = 'Detalle · ' + nombre;
  document.title = 'Detalle · ' + nombre;

  // Calcular score global de dimensión
  const allVals = [];
  allData.forEach(function(r) {
    for (var i = dim.start; i < dim.end; i++) {
      const v = parseInt(r.respuestas[i]);
      if (!isNaN(v) && v > 0) allVals.push(v);
    }
  });
  const scoreGlobal = calcPct(allVals);
  const bc = barColor(scoreGlobal);

  // Por pregunta
  const pqs = dim.preguntas;
  let preguntasHTML = '';
  pqs.forEach(function(texto, i) {
    const idx = dim.start + i;
    const vals = allData.map(function(r){ return parseInt(r.respuestas[idx]); }).filter(function(v){ return !isNaN(v) && v > 0; });
    const pct = calcPct(vals);
    const color = barColor(pct);

    // Distribución 1-5
    const dist = [1,2,3,4,5].map(function(v){ return vals.filter(function(x){ return x===v; }).length; });
    const maxDist = Math.max(...dist, 1);

    const distHTML = dist.map(function(n, di) {
      const h = Math.round(n / maxDist * 100);
      const pctDist = vals.length ? Math.round(n/vals.length*100) : 0;
      return '<div class="dist-item">' +
        '<div class="dist-pct">' + (pctDist > 0 ? pctDist+'%' : '') + '</div>' +
        '<div class="dist-bar-bg"><div class="dist-bar-fill" style="height:'+h+'%;background:'+ESC_COLORS[di]+'"></div></div>' +
        '<div class="dist-label">' + ESC_LABELS[di] + '</div>' +
        '<div class="dist-label" style="color:var(--muted);margin-top:1px">(' + n + ')</div>' +
      '</div>';
    }).join('');

    preguntasHTML +=
      '<div class="pregunta-row">' +
        '<div class="pregunta-top">' +
          '<div class="pregunta-num">P' + (idx+1) + '</div>' +
          '<div class="pregunta-texto">' + texto + '</div>' +
          '<div class="pregunta-pct" style="color:' + color + '">' + pct + '%</div>' +
        '</div>' +
        '<div class="barra-wrap">' +
          '<span class="barra-0">0</span>' +
          '<div class="barra-bg"><div class="barra-fill" style="width:'+pct+'%;background:'+color+'"></div></div>' +
          '<span class="barra-100">100</span>' +
        '</div>' +
        '<div class="dist-wrap">' + distHTML + '</div>' +
      '</div>';
  });

  document.getElementById('content').innerHTML =
    '<div class="hero">' +
      '<div class="hero-icon">' + dim.icon + '</div>' +
      '<div>' +
        '<div class="hero-eyebrow">Detalle de dimensión</div>' +
        '<div class="hero-title">' + nombre + '</div>' +
        '<div class="hero-sub">' + dim.sub + '</div>' +
      '</div>' +
      '<div class="hero-score">' +
        '<div class="hero-score-val" style="color:' + bc + '">' + scoreGlobal + '<span style="font-size:20px;color:var(--muted)">%</span></div>' +
        '<div class="hero-score-lbl">Score dimensión</div>' +
        '<div class="hero-score-badge" style="background:' + bc + '22;color:' + bc + ';border:1px solid ' + bc + '44">' + scoreLabel(scoreGlobal) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="resumen-grid">' +
      '<div class="resumen-card"><div class="resumen-label">Respuestas analizadas</div><div class="resumen-val">' + allData.length + '</div><div class="resumen-sub">Total participantes</div></div>' +
      '<div class="resumen-card"><div class="resumen-label">Preguntas evaluadas</div><div class="resumen-val">' + pqs.length + '</div><div class="resumen-sub">En esta dimensión</div></div>' +
      '<div class="resumen-card"><div class="resumen-label">Score global</div><div class="resumen-val" style="color:' + bc + '">' + scoreGlobal + '<span>%</span></div><div class="resumen-sub">' + scoreLabel(scoreGlobal) + '</div></div>' +
    '</div>' +
    '<div class="section-title">Detalle por pregunta</div>' +
    '<div class="section-sub">% de respuestas favorables (4-5) por cada pregunta · Con distribución de respuestas</div>' +
    preguntasHTML;
}

function renderJefe(allData) {
  const rows = allData.filter(function(r){ return (r.jefe || '').trim() === nombre.trim(); });
  document.getElementById('topbar-title').textContent = 'Detalle · ' + nombre;
  document.title = 'Detalle · ' + nombre;

  if (rows.length < 5) {
    document.getElementById('content').innerHTML = '<div class="empty">Este jefe tiene menos de 5 evaluaciones. No se puede mostrar el detalle para proteger el anonimato.</div>';
    return;
  }

  // Score liderazgo
  const allVals = [];
  rows.forEach(function(r) {
    for (var i = 0; i < 20; i++) {
      const v = parseInt(r.respuestas[i]);
      if (!isNaN(v) && v > 0) allVals.push(v);
    }
  });
  const scoreGlobal = calcPct(allVals);
  const bc = barColor(scoreGlobal);

  let preguntasHTML = '';
  PREGUNTAS.jefe.forEach(function(texto, i) {
    const vals = rows.map(function(r){ return parseInt(r.respuestas[i]); }).filter(function(v){ return !isNaN(v) && v > 0; });
    const pct = calcPct(vals);
    const color = barColor(pct);

    const dist = [1,2,3,4,5].map(function(v){ return vals.filter(function(x){ return x===v; }).length; });
    const maxDist = Math.max(...dist, 1);

    const distHTML = dist.map(function(n, di) {
      const h = Math.round(n / maxDist * 100);
      const pctDist = vals.length ? Math.round(n/vals.length*100) : 0;
      return '<div class="dist-item">' +
        '<div class="dist-pct">' + (pctDist > 0 ? pctDist+'%' : '') + '</div>' +
        '<div class="dist-bar-bg"><div class="dist-bar-fill" style="height:'+h+'%;background:'+ESC_COLORS[di]+'"></div></div>' +
        '<div class="dist-label">' + ESC_LABELS[di] + '</div>' +
        '<div class="dist-label" style="color:var(--muted);margin-top:1px">(' + n + ')</div>' +
      '</div>';
    }).join('');

    preguntasHTML +=
      '<div class="pregunta-row">' +
        '<div class="pregunta-top">' +
          '<div class="pregunta-num">P' + (i+1) + '</div>' +
          '<div class="pregunta-texto">' + texto + '</div>' +
          '<div class="pregunta-pct" style="color:' + color + '">' + pct + '%</div>' +
        '</div>' +
        '<div class="barra-wrap">' +
          '<span class="barra-0">0</span>' +
          '<div class="barra-bg"><div class="barra-fill" style="width:'+pct+'%;background:'+color+'"></div></div>' +
          '<span class="barra-100">100</span>' +
        '</div>' +
        '<div class="dist-wrap">' + distHTML + '</div>' +
      '</div>';
  });

  document.getElementById('content').innerHTML =
    '<div class="hero">' +
      '<div class="hero-icon">🙋</div>' +
      '<div>' +
        '<div class="hero-eyebrow">Detalle de liderazgo</div>' +
        '<div class="hero-title">' + nombre + '</div>' +
        '<div class="hero-sub">' + rows.length + ' evaluaciones recibidas</div>' +
      '</div>' +
      '<div class="hero-score">' +
        '<div class="hero-score-val" style="color:' + bc + '">' + scoreGlobal + '<span style="font-size:20px;color:var(--muted)">%</span></div>' +
        '<div class="hero-score-lbl">Score liderazgo</div>' +
        '<div class="hero-score-badge" style="background:' + bc + '22;color:' + bc + ';border:1px solid ' + bc + '44">' + scoreLabel(scoreGlobal) + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="resumen-grid">' +
      '<div class="resumen-card"><div class="resumen-label">Evaluaciones</div><div class="resumen-val">' + rows.length + '</div><div class="resumen-sub">Colaboradores que evaluaron</div></div>' +
      '<div class="resumen-card"><div class="resumen-label">Preguntas</div><div class="resumen-val">20</div><div class="resumen-sub">De la dimensión liderazgo</div></div>' +
      '<div class="resumen-card"><div class="resumen-label">Score liderazgo</div><div class="resumen-val" style="color:' + bc + '">' + scoreGlobal + '<span>%</span></div><div class="resumen-sub">' + scoreLabel(scoreGlobal) + '</div></div>' +
    '</div>' +
    '<div class="section-title">Detalle por pregunta</div>' +
    '<div class="section-sub">% de respuestas favorables (4-5) · Con distribución de cada respuesta</div>' +
    preguntasHTML;
}

cargarDatos();
</script>
</body>
</html>
